name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  audit:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Style check
        run: brew style Casks/wharfside.rb

      - name: Audit cask
        run: |
          brew tap wharfside/wharfside "$GITHUB_WORKSPACE"
          brew trust --tap wharfside/wharfside
          brew audit --cask --online wharfside
